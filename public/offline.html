<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7C6EF5" />
    <title>You're offline — Kiiya</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        background: #1e1b2e;
        color: #f0eeff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
      }
      .logo {
        font-size: 28px;
        font-weight: 700;
        color: #7c6ef5;
        margin-bottom: 32px;
      }
      .emoji {
        font-size: 64px;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      p {
        font-size: 15px;
        color: #a89ec9;
        max-width: 320px;
        margin-bottom: 28px;
        line-height: 1.5;
      }
      button {
        background: #7c6ef5;
        color: #fff;
        border: 0;
        border-radius: 12px;
        padding: 12px 28px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s ease;
      }
      button:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="logo">✦ Kiiya</div>
    <div class="emoji">📡</div>
    <h1>You're offline</h1>
    <p>
      We can't reach the internet right now. Check your connection and try
      again — your saved moments will be here when you're back.
    </p>
    <button onclick="window.location.reload()">Try again</button>
  </body>
</html>
